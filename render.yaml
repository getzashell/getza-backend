services:
  - type: web
    name: getza-backend
    env: node
    region: london
    buildCommand: npm install && npx prisma generate && npx tsc -b
    startCommand: node dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
