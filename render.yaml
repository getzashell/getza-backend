services:
  - type: web
    name: getza-backend
    env: node
    region: frankfurt
    healthCheckPath: /healthz
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
